<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Railway purple gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3FC5"/>
      <stop offset="100%" stop-color="#4B2A8A"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Main icon area -->
  <g transform="translate(180,315)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ffffff" stroke-width="20"/>
    <line x1="70" y1="70" x2="120" y2="120" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M -50 -25 Q 0 -55 50 -25" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    <line x1="-15" y1="5" x2="-15" y2="30" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
    <line x1="-15" y1="30" x2="-15" y2="45" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Title text -->
  <text x="380" y="280" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">Whoogle Search</text>
  
  <!-- Subtitle -->
  <text x="380" y="340" font-family="Arial, sans-serif" font-size="28" fill="#e0e0ff">Privacy-focused metasearch engine</text>
  
  <!-- Deploy badge -->
  <g transform="translate(380,430)">
    <rect width="240" height="50" rx="25" fill="#ffffff"/>
    <text x="120" y="33" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6C3FC5" text-anchor="middle">Deploy on Railway</text>
  </g>
</svg>